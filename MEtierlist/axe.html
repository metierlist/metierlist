<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Axe Tier List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(270deg,#1a0033,#2a0066,#001a66,#3b0077);
background-size:800% 800%;
animation:gradientMove 10s ease infinite;
color:white;
overflow-x:hidden;
}

*{box-sizing:border-box;}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* BACK */
.backbtn{
position:absolute;
left:20px;
top:10px;
background:#2a0066;
color:white;
padding:10px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:120px;
padding:25px 40px;
}

.title{
font-size:64px;
font-weight:bold;
}

/* NAV */
.navbar{
display:flex;
gap:14px;
}

.navitem{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:80px;
height:70px;
border-radius:12px;
background:rgba(40,0,80,0.45);
text-decoration:none;
color:#ccc;
font-size:13px;
}

.navitem img{
width:34px;
height:34px;
margin-bottom:4px;
}

/* SEARCH */
.search{
width:500px;
height:42px;
border-radius:25px;
border:1px solid #5b3cff;
background:#140033;
color:white;
padding:0 18px;
font-size:15px;
display:block;
margin:20px auto;
}

/* TIER GRID */
.tiers{
width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;
}

/* BOX */
.tier-box{
background:#12002b;
border-radius:12px;
border:1px solid #4a3cff;
overflow:hidden;
}

.tier-header{
padding:12px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.t1{background:#ff3b3b;}
.t2{background:#ffcc00;color:black;}
.t3{background:#4caf50;}
.t4{background:#3fa9f5;}
.t5{background:#9c6bff;}

/* PLAYER */
.player{
display:flex;
align-items:center;
padding:10px;
border-top:1px solid #2c3c4f;
background:#202c3a;
cursor:pointer;
}

.player:hover{background:#263646;}

.skin{
width:30px;
height:30px;
margin-right:10px;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#0e1a2b;
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
position:relative;
}

.popup-skin{
width:90px;
}

.close{
position:absolute;
top:15px;
right:20px;
font-size:22px;
cursor:pointer;
}

/* MOBILE */
@media (max-width:600px){

.header{
flex-direction:column;
gap:20px;
text-align:center;
}

.title{font-size:40px;}

.navbar{
flex-wrap:wrap;
justify-content:center;
}

.navitem{
width:65px;
height:60px;
font-size:10px;
}

.search{
width:90%;
height:38px;
}

/* SWIPE */
.tiers{
display:flex;
overflow-x:auto;
gap:15px;
padding:10px;
scroll-snap-type:x mandatory;
}

.tier-box{
min-width:90%;
flex-shrink:0;
scroll-snap-align:center;
}

.player{
font-size:14px;
padding:8px;
}

.skin{
width:26px;
height:26px;
}

.popup-box{
width:90%;
max-width:320px;
padding:20px;
}

}

</style>
</head>

<body>

<a href="index.html" class="backbtn">⬅ Back</a>

<div class="header">
<div class="title">METierlist</div>

<div class="navbar">
<a class="navitem" href="vanilla.html"><img src="https://pvptiers.com/icons/badges/crystal.webp">Vanilla</a>
<a class="navitem" href="uhc.html"><img src="https://pvptiers.com/icons/badges/uhc.webp">UHC</a>
<a class="navitem" href="pot.html"><img src="https://pvptiers.com/icons/badges/pot.webp">Pot</a>
<a class="navitem" href="nethop.html"><img src="https://pvptiers.com/icons/badges/neth_pot.webp">NethOP</a>
<a class="navitem" href="smp.html"><img src="https://pvptiers.com/icons/badges/smp.webp">SMP</a>
<a class="navitem" href="sword.html"><img src="https://pvptiers.com/icons/badges/sword.webp">Sword</a>
<a class="navitem" href="axe.html"><img src="https://pvptiers.com/icons/badges/axe.webp">Axe</a>
<a class="navitem" href="mace.html"><img src="https://pvptiers.com/icons/badges/mace.webp">Mace</a>
</div>
</div>

<input class="search" id="search" placeholder="Search Axe player...">

<div class="tiers">
<div class="tier-box"><div class="tier-header t1">🏆 Tier 1</div><div id="tier1"></div></div>
<div class="tier-box"><div class="tier-header t2">🥈 Tier 2</div><div id="tier2"></div></div>
<div class="tier-box"><div class="tier-header t3">🥉 Tier 3</div><div id="tier3"></div></div>
<div class="tier-box"><div class="tier-header t4">Tier 4</div><div id="tier4"></div></div>
<div class="tier-box"><div class="tier-header t5">Tier 5</div><div id="tier5"></div></div>
</div>

<div class="popup" id="popup">
<div class="popup-box">
<div class="close" onclick="closePopup()">✖</div>

<img id="popupSkin" class="popup-skin">
<h2 id="popupName"></h2>

<div id="popupKits" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;"></div>
</div>
</div>

<script src="players.js"></script>

<script>

function getTierNumber(t){
return parseInt(t.replace("HT","").replace("LT",""));
}

/* SAFE RENDER */
function render(list){

document.querySelectorAll("#tier1,#tier2,#tier3,#tier4,#tier5")
.forEach(e => e.innerHTML = "");

list.forEach(p => {

let index = p.kits.findIndex(k => k.toLowerCase() === "axe");
if(index === -1) return;

let tier = p.tiers[index];
let num = getTierNumber(tier);

let container = document.getElementById("tier" + num);
if(!container) return;

let div = document.createElement("div");
div.className = "player";
div.onclick = () => openProfile(p);

div.innerHTML = `
<img class="skin" src="https://mc-heads.net/avatar/${p.name}">
${p.name}
`;

container.appendChild(div);

});

}

/* POPUP */
function openProfile(p){

popup.style.display="flex";
popupSkin.src=`https://mc-heads.net/avatar/${p.name}`;
popupName.innerText=p.name;

let kitIcons={
vanilla:"https://pvptiers.com/icons/badges/crystal.webp",
uhc:"https://pvptiers.com/icons/badges/uhc.webp",
pot:"https://pvptiers.com/icons/badges/pot.webp",
nethop:"https://pvptiers.com/icons/badges/neth_pot.webp",
smp:"https://pvptiers.com/icons/badges/smp.webp",
sword:"https://pvptiers.com/icons/badges/sword.webp",
axe:"https://pvptiers.com/icons/badges/axe.webp",
mace:"https://pvptiers.com/icons/badges/mace.webp"
};

let html="";

p.kits.forEach((k,i)=>{
let t=p.tiers[i];
let n=t.replace("HT","").replace("LT","");
html+=`
<div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
<img src="${kitIcons[k.toLowerCase()]||''}" style="width:34px;height:34px;">
<span class="t${n}">${t}</span>
</div>
`;
});

popupKits.innerHTML=html;
}

/* CLOSE */
function closePopup(){
popup.style.display="none";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();
render(players.filter(p=>p.name.toLowerCase().includes(val)));
});

/* INIT */
render(players);

</script>

</body>
</html>
