<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>METierlist</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="text/javascript">
(function (l) {
  if (l.search[1] === "/") {
    var decoded = l.search
      .slice(1)
      .split("&")
      .map(function (s) {
        return s.replace(/~and~/g, "&");
      })
      .join("?");
    window.history.replaceState(
      null,
      null,
      l.pathname.slice(0, -1) + decoded + l.hash
    );
  }
})(window.location);
</script>

<style>

body{
margin:0;
font-family:Arial;
background: linear-gradient(270deg,#1a0033,#2a0066,#001a66,#3b0077);
background-size:800% 800%;
animation:gradientMove 10s ease infinite;
color:white;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */

.header{
display:flex;
align-items:center;
gap:120px;
padding:25px 40px;
}

.title{
font-size:64px;
font-weight:bold;
letter-spacing:3px;
text-shadow:
0 0 10px rgba(120,120,255,0.8),
0 0 20px rgba(120,120,255,0.6),
0 0 40px rgba(120,120,255,0.4);
}

.navbar{
display:flex;
align-items:center;
gap:20px;
}

.navitem{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
width:75px;
height:65px;
border-radius:12px;
text-decoration:none;
color:#ccc;
font-size:12px;
background:rgba(40,0,80,0.45);
transition:0.2s;
}

.navitem:hover{
background:#3b2aa8;
transform:translateY(-3px);
color:white;
}

.navitem img{
width:32px;
height:32px;
margin-bottom:4px;
}

/* CONTAINER */

.container{
width:850px;
margin:120px auto 60px auto;
}

/* SEARCH */

.search{
width:100%;
height:44px;
border-radius:25px;
border:1px solid #5b3cff;
background:#140033;
color:white;
padding:0 20px;
margin-bottom:30px;
font-size:16px;
}

/* PLAYER CARD */

.player-card{
display:flex;
align-items:center;
background:#12002b;
border:1px solid #4a3cff;
border-radius:14px;
padding:18px;
margin-bottom:14px;
cursor:pointer;
transition:0.15s;
}

.player-card:hover{
transform:scale(1.02);
}

/* TOP 3 */

.first{
background:linear-gradient(135deg,#b9f2ff,#7dd3ff);
color:#003344;
box-shadow:0 0 20px rgba(120,220,255,0.8);
}
.second{background:linear-gradient(135deg,#c0c0c0,#8a8a8a);}
.third{background:linear-gradient(135deg,#cd7f32,#8b5a2b);}

/* SKIN */

.skin{
width:64px;
height:64px;
margin-right:20px;
}

/* PLAYER INFO */

.info{
flex:1;
margin-left:10px;
}

.name{
font-size:22px;
font-weight:bold;
}

.region{
display:inline-block;
padding:3px 10px;
border-radius:6px;
font-size:12px;
margin-bottom:6px;
}

/* REGION COLORS */

.NA{background:#ff4d4d;}
.EU{background:#4da6ff;}
.AS{background:#ffcc00;color:black;}
.ME{background:#8aff66;color:black;}

/* KITS */

.kits{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-bottom:8px;
}

.kit{
background:#2a0066;
padding:4px 10px;
border-radius:6px;
font-size:13px;
color:white;
}

.kit-icon{
width:26px;
height:26px;
border-radius:6px;
background:#2a0066;
padding:4px;
}

.tier-box{
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
}

.tier-icon{
width:26px;
height:26px;
border-radius:6px;
background:#2a0066;
padding:3px;
}

/* TIERS */

.tiers{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.badge{
padding:6px 12px;
border-radius:8px;
font-weight:bold;
}

/* TIER COLORS */

.HT1{background:#ff3b3b;}
.LT1{background:#ff8a3b;}

.HT2{background:#ffcc00;color:black;}
.LT2{background:#e6b800;color:black;}

.HT3{background:#4caf50;}
.LT3{background:#3e8e41;}

.HT4{background:#3fa9f5;}
.LT4{background:#2f7ec1;}

.HT5{background:#9c6bff;}
.LT5{background:#7a52c7;}

.points{
font-size:20px;
font-weight:bold;
color:#6aa9ff;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup-box{
background:#0e1a2b;
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
position:relative;
}

.popup-skin{
width:90px;
border-radius:50%;
margin-bottom:10px;
}

.close{
position:absolute;
right:20px;
top:15px;
font-size:22px;
cursor:pointer;
}

.close{
position:absolute;
right:20px;
top:15px;
font-size:22px;
cursor:pointer;
}

/* ========================= */
/* 📱 MOBILE OPTIMIZATION */
/* ========================= */

@media (max-width: 600px){

/* header stack */
.header{
flex-direction:column;
gap:20px;
align-items:center;
text-align:center;
}

.title{
font-size:40px;
}

.navbar{
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.navitem{
width:65px;
height:60px;
font-size:10px;
}

/* container */
.container{
width:95%;
margin:40px auto;
}

/* player card redesign */
.player-card{
flex-direction:row;
align-items:center;
justify-content:space-between;
padding:12px;
}

/* LEFT: player */
.skin{
width:50px;
height:50px;
margin-right:10px;
}

/* MIDDLE: kits + tiers stacked */
.info{
display:flex;
flex-direction:column;
gap:6px;
flex:1;
}

/* kits row */
.tiers{
display:flex;
flex-wrap:wrap;
gap:6px;
}

/* make icon + tier aligned like image */
.tier-box{
flex-direction:column;
align-items:center;
}

/* RIGHT: points */
.points{
font-size:16px;
min-width:50px;
text-align:right;
}

/* name smaller */
.name{
font-size:16px;
}

/* region smaller */
.region{
font-size:10px;
padding:2px 6px;
display:inline-block;
align-self:flex-start;
}

}

</style>
</head>

<body>

<div class="header">

<div class="title">METierlist</div>

<div class="navbar">
<a class="navitem" href="vanilla.html"><img src="https://pvptiers.com/icons/badges/crystal.webp">Vanilla</a>
<a class="navitem" href="uhc.html"><img src="https://pvptiers.com/icons/badges/uhc.webp">UHC</a>
<a class="navitem" href="pot.html"><img src="https://pvptiers.com/icons/badges/pot.webp">Pot</a>
<a class="navitem" href="nethop.html"><img src="https://pvptiers.com/icons/badges/neth_pot.webp">NethOP</a>
<a class="navitem" href="smp.html"><img src="https://pvptiers.com/icons/badges/smp.webp">SMP</a>
<a class="navitem" href="sword.html"><img src="https://pvptiers.com/icons/badges/sword.webp">Sword</a>
<a class="navitem" href="axe.html"><img src="https://pvptiers.com/icons/badges/axe.webp">Axe</a>
<a class="navitem" href="mace.html"><img src="https://pvptiers.com/icons/badges/mace.webp">Mace</a>
</div>

</div>

<div class="container">
<input class="search" id="search" placeholder="Search player...">
<div id="players"></div>
</div>

<div class="popup" id="popup">
<div class="popup-box">
<div class="close" onclick="closePopup()">✖</div>
<img id="popupSkin" class="popup-skin">
<h2 id="popupName"></h2>
<div id="popupRegion"></div>
<h3 id="popupPoints"></h3>
<h4>Tiers</h4>
<div id="popupKits" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:15px;"></div>

<div id="popupTiers" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;"></div>
</div>
</div>

<script src="players.js"></script>

<script>

/* --- PREPROCESS PLAYERS --- (same as yours) */

const tierRank={
HT1:10,LT1:9,
HT2:8,LT2:7,
HT3:6,LT3:5,
HT4:4,LT4:3,
HT5:2,LT5:1
};

const merged={};

players.forEach(p=>{
if(!merged[p.name]){
merged[p.name]={name:p.name,region:p.region,kits:{}};
}
p.kits.forEach((kit,i)=>{
const key=kit.toLowerCase();
const tier=p.tiers[i];
merged[p.name].kits[key]=tier;
});
});

players.length=0;

Object.values(merged).forEach(p=>{
const kits=[],tiers=[];
Object.keys(p.kits).forEach(k=>{
kits.push(k);
tiers.push(p.kits[k]);
});
players.push({name:p.name,region:p.region,kits,tiers});
});

/* ORIGINAL LOGIC */

const tierPoints={
HT1:60,LT1:45,
HT2:30,LT2:20,
HT3:10,LT3:6,
HT4:4,LT4:3,
HT5:2,LT5:1
};

players.forEach(p=>{
let total=0;
p.tiers.forEach(t=>total+=tierPoints[t]);
p.points=total;
});

players.sort((a,b)=>b.points-a.points);

function render(list){
const container=document.getElementById("players");
container.innerHTML="";

let currentRank = 0;
let lastPoints = null;

list.forEach((p,i)=>{

// ✅ HANDLE TIES
if(p.points !== lastPoints){
currentRank = i + 1;
lastPoints = p.points;
}

// ✅ COLOR BASED ON RANK (NOT INDEX)
let rankClass="";
if(currentRank === 1) rankClass="first";
else if(currentRank === 2) rankClass="second";
else if(currentRank === 3) rankClass="third";

const kitIcons={
vanilla:"https://pvptiers.com/icons/badges/crystal.webp",
uhc:"https://pvptiers.com/icons/badges/uhc.webp",
pot:"https://pvptiers.com/icons/badges/pot.webp",
nethop:"https://pvptiers.com/icons/badges/neth_pot.webp",
smp:"https://pvptiers.com/icons/badges/smp.webp",
sword:"https://pvptiers.com/icons/badges/sword.webp",
axe:"https://pvptiers.com/icons/badges/axe.webp",
mace:"https://pvptiers.com/icons/badges/mace.webp"
};

let tiersHTML="";

p.tiers.forEach((t,i)=>{
const kit=p.kits[i];
const icon=kitIcons[kit.toLowerCase()]||"https://via.placeholder.com/24";

tiersHTML+=`
<div class="tier-box">
<img class="tier-icon" src="${icon}">
<span class="badge ${t}">${t}</span>
</div>
`;
});

let card=document.createElement("div");

card.className="player-card "+rankClass;
card.onclick=()=>openProfile(p);

card.innerHTML=`
<img class="skin" src="https://mc-heads.net/avatar/${p.name}">
<div class="info">
<div class="name">#${currentRank} ${p.name}</div>
<div class="region ${p.region}">${p.region}</div>
<div class="tiers">${tiersHTML}</div>
</div>
<div class="points">${p.points} pts</div>
`;

container.appendChild(card);

});
}

function openProfile(p){
document.getElementById("popup").style.display="flex";

popupSkin.src=`https://mc-heads.net/avatar/${p.name}`;
popupName.innerText=p.name;
popupRegion.innerText=p.region;
popupPoints.innerText=p.points+" points";

const kitIcons={
vanilla:"https://pvptiers.com/icons/badges/crystal.webp",
uhc:"https://pvptiers.com/icons/badges/uhc.webp",
pot:"https://pvptiers.com/icons/badges/pot.webp",
nethop:"https://pvptiers.com/icons/badges/neth_pot.webp",
smp:"https://pvptiers.com/icons/badges/smp.webp",
sword:"https://pvptiers.com/icons/badges/sword.webp",
axe:"https://pvptiers.com/icons/badges/axe.webp",
mace:"https://pvptiers.com/icons/badges/mace.webp"
};

/* 🔥 PERFECT ALIGN: ICON ABOVE TIER */
let combined="";

p.kits.forEach((k,i)=>{
const t = p.tiers[i];
const icon = kitIcons[k.toLowerCase()] || "https://via.placeholder.com/32";

combined+=`
<div style="display:flex;flex-direction:column;align-items:center;gap:5px;">
  <img src="${icon}" style="width:32px;height:32px;border-radius:6px;background:#2a0066;padding:5px;">
  <span class="badge ${t}">${t}</span>
</div>
`;
});

/* put everything in ONE container */
popupKits.innerHTML = combined;
popupTiers.innerHTML = "";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

render(players);

search.addEventListener("input",()=>{
let text=search.value.toLowerCase();
let filtered=players.filter(p=>p.name.toLowerCase().includes(text));
render(filtered);
});

</script>

</body>
</html>
